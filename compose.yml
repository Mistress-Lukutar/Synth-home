services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - LOG_LEVEL=INFO
      - DATABASE_URL=sqlite+aiosqlite:///./data/zigbeehub.db
    volumes:
      - ./data:/app/data
    # Uncomment to map a USB Zigbee coordinator (Linux)
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyUSB0
    restart: unless-stopped
